<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Gradebook - Pict Example</title>
		<!-- PICT Dynamic View CSS Container -->
		<style id="PICT-CSS"></style>
		<!-- Schoolroom theme for the Gradebook example -->
		<style>
			*, *::before, *::after { box-sizing: border-box; }
			body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #F4F1E8; color: #2E2B26; }

			/* --- Header Bar --- */
			.pict-example-header { display: flex; align-items: stretch; background: #2C3E50; border-bottom: 3px solid #C0392B; }
			.pict-example-badge { background: #C0392B; color: #fff; padding: 0.6rem 1rem; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; display: flex; align-items: center; gap: 0.5rem; }
			.pict-example-badge svg { width: 14px; height: 14px; fill: #fff; flex-shrink: 0; }
			.pict-example-app-name { padding: 0.6rem 1rem; color: #F4F1E8; font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; }
			.pict-example-module { margin-left: auto; padding: 0.6rem 1rem; color: #BDC3C7; font-size: 0.75rem; display: flex; align-items: center; letter-spacing: 0.03em; }

			/* --- Content Area --- */
			.pict-example-content { padding: 1.5rem; }
			#Pict-Form-Container { background: #fff; border: 1px solid #D5CCB2; border-top: 4px solid #C0392B; border-radius: 6px; padding: 1.25rem; box-shadow: 0 2px 8px rgba(44,62,80,0.08); }

			/* --- Form Element Styling --- */
			#Pict-Form-Container input[type="text"],
			#Pict-Form-Container input[type="Number"],
			#Pict-Form-Container input[type="number"],
			#Pict-Form-Container textarea,
			#Pict-Form-Container select { border: 1px solid #D5CCB2; background: #FFFCF7; padding: 0.4rem 0.55rem; border-radius: 3px; font-size: 0.85rem; color: #2E2B26; width: 100%; }
			#Pict-Form-Container input:focus,
			#Pict-Form-Container textarea:focus,
			#Pict-Form-Container select:focus { outline: none; border-color: #C0392B; box-shadow: 0 0 0 2px rgba(192,57,43,0.15); }
			#Pict-Form-Container label { color: #2E2B26; font-weight: 600; font-size: 0.85rem; }
			#Pict-Form-Container h2, #Pict-Form-Container h3, #Pict-Form-Container h4 { color: #2C3E50; }

			/* --- Table Styling --- */
			#Pict-Form-Container table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
			#Pict-Form-Container th { background: #2C3E50; color: #F4F1E8; padding: 0.45rem 0.6rem; text-align: left; font-size: 0.78rem; border-right: 1px solid #34495E; }
			#Pict-Form-Container th:last-child { border-right: none; }
			#Pict-Form-Container td { padding: 0.35rem 0.55rem; border-bottom: 1px solid #EBE6D6; border-right: 1px solid #EBE6D6; font-size: 0.85rem; }
			#Pict-Form-Container td:last-child { border-right: none; }
			#Pict-Form-Container tr:nth-child(even) td { background: #FBF8EE; }

			/* --- New Tabular Feature Styling --- */
			#Pict-Form-Container .pict-tabular-extra-header-row th { background: #34495E; }
			#Pict-Form-Container .pict-tabular-dynamic-header-group { background: #16A085; color: #fff; text-align: center; }
			#Pict-Form-Container .pict-tabular-static-header-spacer { background: #34495E; }
			#Pict-Form-Container .pict-row-label { background: #F4F1E8; font-weight: 600; color: #2C3E50; border-right: 2px solid #D5CCB2; }
			#Pict-Form-Container .pict-row-label-clustered { background: #E8E0CB; }
			#Pict-Form-Container .pict-row-label-header { background: #2C3E50; }
			#Pict-Form-Container .pict-row-label-spacer { background: #34495E; }
			#Pict-Form-Container .gradebook-banner { background: #C0392B; color: #fff; text-align: center; letter-spacing: 0.04em; }

			/* --- Selectable Rows / Columns --- */
			#Pict-Form-Container .pict-tabular-row-select,
			#Pict-Form-Container .pict-tabular-column-select { text-align: center; background: #F4F1E8; }
			#Pict-Form-Container .pict-tabular-row-select-header,
			#Pict-Form-Container .pict-tabular-column-select-row th { background: #34495E; text-align: center; }
			#Pict-Form-Container .pict-tabular-row-select input,
			#Pict-Form-Container .pict-tabular-column-select input { width: auto; cursor: pointer; margin: 0; }
			/* Highlight tint applied by the selection feature and the highlight solvers */
			#Pict-Form-Container { --pict-tabular-highlight-color: #FCEAA8; }

			/* --- Tabs --- */
			#Pict-Form-Container .pict-tab-section-selector { display: flex; gap: 0.25rem; margin-bottom: 1rem; border-bottom: 2px solid #D5CCB2; }
			#Pict-Form-Container .pict-tab-section-selector a,
			#Pict-Form-Container .pict-tab-section-selector button { display: inline-block; padding: 0.5rem 1rem; color: #2C3E50; background: #F4F1E8; border: 1px solid #D5CCB2; border-bottom: none; text-decoration: none; font-weight: 600; font-size: 0.85rem; border-radius: 4px 4px 0 0; cursor: pointer; }
			#Pict-Form-Container .pict-tab-section-selector .selected,
			#Pict-Form-Container .pict-tab-section-selector .active { background: #C0392B; color: #fff; border-color: #C0392B; }

			/* --- Buttons & Links --- */
			#Pict-Form-Container button,
			#Pict-Form-Container input[type="button"],
			#Pict-Form-Container input[type="submit"] { background: #C0392B; color: #fff; border: none; padding: 0.4rem 1rem; border-radius: 3px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
			#Pict-Form-Container a { color: #2C3E50; }
		</style>
		<script src="./pict.min.js" type="text/javascript"></script>
		<script type="text/javascript">Pict.safeOnDocumentReady(() => { Pict.safeLoadPictApplication(GradebookApplication, 0)});</script>
	</head>
	<body>
		<div class="pict-example-header">
			<div class="pict-example-badge">
				<svg viewBox="0 0 16 16"><polygon points="8,1 10,6 16,6 11,9.5 13,15 8,11.5 3,15 5,9.5 0,6 6,6"/></svg>
				Pict Example
			</div>
			<div class="pict-example-app-name">Gradebook</div>
			<div class="pict-example-module">pict-section-form</div>
		</div>
		<div class="pict-example-content">
			<div id="Pict-Form-Container"></div>
		</div>
		<script src="./gradebook_application.min.js" type="text/javascript"></script>
	</body>
</html>
